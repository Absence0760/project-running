name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-packages:
    name: Test Flutter packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run test
      - run: melos run analyze

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: melos bootstrap
      - working-directory: apps/mobile_ios
        run: flutter build ipa --no-codesign

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: melos bootstrap
      - working-directory: apps/mobile_android
        run: flutter build appbundle

  build-watch-swift:
    name: Build Apple Watch
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          xcodebuild -project apps/watch_ios/WatchApp.xcodeproj \
            -scheme WatchApp \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 9' \
            build

  build-web:
    name: Build Web (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --workspace=apps/web
      - run: npm run lint --workspace=apps/web
      - run: npm run build --workspace=apps/web

  deploy-functions:
    name: Deploy Edge Functions
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test-packages, build-web]
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - run: |
          supabase functions deploy strava-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy strava-import --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy parkrun-import --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy refresh-tokens --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy export-data --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
