name: Release Android

# Per-app tag convention: `mobile_android@1.2.3`. The workflow parses the
# version out of the tag, injects it into the AAB, signs it with the
# release keystore from Secrets, uploads to Play Internal track, and
# attaches the AAB to a GitHub Release so there's an audit trail.
#
# Secrets this workflow reads (configure under Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64       base64-encoded upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD     store password
#   ANDROID_KEY_ALIAS             alias inside the keystore
#   ANDROID_KEY_PASSWORD          key password (often same as store)
#   PLAY_SERVICE_ACCOUNT_JSON     Google Play service-account JSON key
#                                 (grant the account "Release apps to testing
#                                 tracks" on the Play Console)
#
# See docs/releasing.md for the end-to-end flow.

on:
  push:
    tags:
      - 'mobile_android@*'

jobs:
  release:
    name: Build, sign, upload to Play Internal
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git rev-list --count needs full history

      - name: Parse version from tag
        id: version
        run: |
          # `mobile_android@1.2.3` → `1.2.3`. Version code derives from
          # the total commit count so it always increases across releases
          # regardless of how versionName moves.
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${TAG#mobile_android@}"
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: dart pub global activate melos
      - run: melos bootstrap

      - name: Pin versionName / versionCode from tag
        working-directory: apps/mobile_android
        run: |
          # Flutter reads `version:` from pubspec.yaml as
          # `{versionName}+{versionCode}`. Rewrite it in place so the
          # AAB carries the tag's numbers rather than whatever's
          # committed.
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.name }}+${{ steps.version.outputs.code }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/mobile_android/android/app/upload-keystore.jks
          cat > apps/mobile_android/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Copy dotenv
        run: cp apps/mobile_android/.env.example apps/mobile_android/.env.local

      - name: Build signed AAB
        working-directory: apps/mobile_android
        run: flutter build appbundle --release

      - name: Upload to Play Internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.betterrunner.app
          releaseFiles: apps/mobile_android/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          # Rolling out to a fraction isn't meaningful on the internal
          # track — always 100% there. Promote to beta / prod manually
          # via the Play Console once tested.

      - name: Create GitHub Release + attach AAB
        uses: softprops/action-gh-release@v2
        with:
          name: Android ${{ steps.version.outputs.name }}
          tag_name: ${{ github.ref_name }}
          files: apps/mobile_android/build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
