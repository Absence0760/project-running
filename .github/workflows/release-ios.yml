name: Release iOS

on:
  push:
    tags:
      - 'ios/v*'

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub global activate melos
      - run: melos bootstrap
      - working-directory: apps/mobile_ios
        run: flutter build ipa --no-codesign
